<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="./ressources/style.css">
</head>
<body>
    <nav class="navbar">
        <div id= "logo">Clément</div>
        <div class="navbar-right">
            <ul>
                <li><a href="#">About me</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Contact me</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <div class="landpage">
            <section id="intro">
                <h1>Hello <br>I'm Clément,</h1>
                <p>I’m an aspiring full stack developer, passionate about building clean and user-friendly web apps.
                     After years abroad, I’m deepening my skills through projects and learning. 
                     <br><strong>Explore my work and feel free to connect!</strong></p>
            </section>
            <section id="profile-picture">
                <img src="./ressources/images/profile-pic.png" alt="Picture of Clément Jacquet" >
            </section>
        </div>
        <form action="" method="get" class="form-contact">
            <h2>Let's talk !</h2>
            <div class="form-contact">
                <label for="name">First name: </label>
                <input type="text" name="name" id="name" required>
            </div>
            <div class="form-contact">
                <label for="email">Email address: </label>
                <input type="text" name="email" id="email" required>
            </div>
            <div class="form-contact">
                <label for="message">Enter your message here: </label>
                <input type="text" name="message" id="message">
            </div>
            <div class="form-contact">
                <input type="submit" value="Contact me!" id="contactme">
            </div>
        </form>
    </main>
    <footer></footer>
</body>
</html>
